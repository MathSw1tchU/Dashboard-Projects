<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Math Projects Store</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#171a21;
    color:white;
}

header{
    text-align:center;
    padding:30px;
    background:#1b2838;
}

.logo{
    font-size:36px;
    font-weight:bold;
    cursor:pointer;
}

.search{
    display:flex;
    justify-content:center;
    margin:20px;
}

.search input{
    width:400px;
    padding:12px;
    border:none;
    border-radius:5px;
}

.container{
    width:90%;
    margin:auto;
}

.section-title{
    margin:25px 0;
    color:#66c0f4;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
    gap:20px;
}

.card{
    background:#1b2838;
    border-radius:10px;
    overflow:hidden;
    transition:0.3s;
}

.card:hover{
    transform:scale(1.03);
}

.card img{
    width:100%;
    height:150px;
    object-fit:cover;
}

.card-content{
    padding:15px;
}

.card h3{
    margin-bottom:10px;
}

.card p{
    color:#c7d5e0;
    font-size:14px;
}

.buttons{
    margin-top:15px;
    display:flex;
    gap:10px;
}

.btn{
    text-decoration:none;
    padding:10px;
    border-radius:5px;
    flex:1;
    text-align:center;
    color:white;
}

.play{
    background:#5c7e10;
}

.github{
    background:#2a475e;
}

</style>
</head>
<body>

<header>
    <div class="logo" onclick="window.open('https://github.com/MathSw1tchU?tab=repositories')">
        <img src="1000206106-removebg-preview.png" width="250">
    </div>
</header>

<div class="search">
    <input type="text" id="search" placeholder="Buscar projeto...">
</div>

<div class="container">

<h2 class="section-title">Jogos</h2>

<div class="grid" id="projects">

    <div class="card">
        <img src="file_0000000092bc720eb89e7acb60378908.png">
        <div class="card-content">
            <h3>Football Manager 26</h3>
            <p>Simulador de gerenciamento de futebol</p>

            <div class="buttons">
                <a class="btn play" href="https://mathsw1tchu.github.io/meu-jogo-futebol/">
                    Jogar
                </a>

                <a class="btn github" href="https://github.com/MathSw1tchU/meu-jogo-futebol">
                    GitHub
                </a>
            </div>
        </div>
    </div>
<!--
    <div class="card">
        <img src="https://picsum.photos/400/200?2">
        <div class="card-content">
            <h3>Detective 84</h3>
            <p>Aventura investigativa em texto.</p>

            <div class="buttons">
                <a class="btn play" href="#">
                    Jogar
                </a>

                <a class="btn github" href="#">
                    GitHub
                </a>
            </div>
        </div>
    </div>
-->
</div>

</div>

<script>

const search = document.getElementById("search");

search.addEventListener("keyup", () => {

    let filter = search.value.toLowerCase();

    document.querySelectorAll(".card").forEach(card => {

        let title = card.querySelector("h3")
            .innerText
            .toLowerCase();

        card.style.display =
            title.includes(filter)
            ? "block"
            : "none";

    });

});

</script>

</body>
</html>
